name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v0.13.0)'
        required: true
        type: string

env:
  CUSTOM_GCL_VERSION: v0.0.6

jobs:

  release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Validate version format
      run: |
        if [[ ! "${{ inputs.version }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "Error: version must match vX.Y.Z format (e.g. v0.13.0)"
          exit 1
        fi

    - name: Check release does not already exist
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        if gh release view "${{ inputs.version }}" > /dev/null 2>&1; then
          echo "Error: release ${{ inputs.version }} already exists"
          exit 1
        fi

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod

    - name: Install dependencies
      run: go mod download

    - name: Check format
      run: |
        if [ -n "$(gofmt -l .)" ]; then
          echo "Go code is not formatted. Run 'make fmt'."
          gofmt -d .
          exit 1
        fi

    - name: Vet
      run: make vet

    - name: Download custom-gcl
      run: |
        curl -sL "https://github.com/smeshkov/golangci-lint-plugins/releases/download/${CUSTOM_GCL_VERSION}/custom-gcl-linux-amd64.tar.gz" | tar xz
        chmod +x custom-gcl

    - name: Lint
      run: ./custom-gcl run ./...

    - name: Test
      run: go test -v ./...

    - name: Build binaries
      run: |
        ./_bin/build.sh linux ${{ inputs.version }}
        ./_bin/build.sh darwin ${{ inputs.version }}
        ./_bin/build.sh darwin ${{ inputs.version }} arm64
        ./_bin/build.sh windows ${{ inputs.version }}
      shell: bash

    - name: Create tag
      run: |
        if git ls-remote --tags origin | grep -q "refs/tags/${{ inputs.version }}$"; then
          echo "Tag ${{ inputs.version }} already exists, skipping"
        else
          git tag ${{ inputs.version }}
          git push origin ${{ inputs.version }}
        fi

    - name: Create Release
      id: create_release
      uses: Roang-zero1/github-create-release-action@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        created_tag: ${{ inputs.version }}
        release_title: Release ${{ inputs.version }}
        changelog_file: CHANGELOG.md

    - name: Upload binaries to release
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: _dist/gomock_*
        tag: ${{ inputs.version }}
        overwrite: true
        file_glob: true
