name: Release

on:
  push:
    tags:
    - 'v*'

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod

    - name: Install dependencies
      run: go mod download

    - name: Check format
      run: |
        if [ -n "$(gofmt -l .)" ]; then
          echo "Go code is not formatted. Run 'make fmt'."
          gofmt -d .
          exit 1
        fi

    - name: Vet
      run: make vet 
      
    - name: Download custom-gcl
      run: |
        curl -sL "https://github.com/smeshkov/golangci-lint-plugins/releases/download/${CUSTOM_GCL_VERSION}/custom-gcl-linux-amd64.tar.gz" | tar xz
        chmod +x custom-gcl

    - name: Lint
      run: ./custom-gcl run ./...

    - name: Test
      run: go test -v ./...

    - name: Get the version 
      id: get_version 
      run: echo ::set-output name=VERSION::${GITHUB_REF/refs\/tags\//}

    - name: Build binaries
      run: |
        ./_bin/build.sh linux ${{ steps.get_version.outputs.VERSION }}
        ./_bin/build.sh darwin ${{ steps.get_version.outputs.VERSION }}
        ./_bin/build.sh darwin ${{ steps.get_version.outputs.VERSION }} arm64
        ./_bin/build.sh windows ${{ steps.get_version.outputs.VERSION }}
      shell: bash

    - name: Create Release
      id: create_release
      uses: Roang-zero1/github-create-release-action@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        created_tag: ${{ steps.get_version.outputs.VERSION }}
        release_title: Release ${{ steps.get_version.outputs.VERSION }}
        changelog_file: CHANGELOG.md

    - name: Upload binaries to release
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: _dist/gomock_*
        tag: ${{ github.ref }}
        overwrite: true
        file_glob: true
