name: Test

on:
  push:
    branches: [ '*' ]

env:
  CUSTOM_GCL_VERSION: v0.0.6

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod

    - name: Install dependencies
      run: go mod download

    - name: Build
      run: go build -v ./...

    - name: Check format
      run: |
        if [ -n "$(gofmt -l .)" ]; then
          echo "Go code is not formatted. Run 'make fmt'."
          gofmt -d .
          exit 1
        fi

    - name: Vet
      run: make vet 
      
    - name: Download custom-gcl
      run: |
        curl -sL "https://github.com/smeshkov/golangci-lint-plugins/releases/download/${CUSTOM_GCL_VERSION}/custom-gcl-linux-amd64.tar.gz" | tar xz
        chmod +x custom-gcl

    - name: Lint
      run: ./custom-gcl run ./...

    - name: Test
      run: go test -v ./...
